[[menu.social]]
  identifier = "linkedin"
  name = "LinkedIn"
  url = "https://www.linkedin.com/in/shih-yuchih/"
  weight = 20
  params = { icon = "linkedin" }

[[menu.social]]
  identifier = "twitter"
  name = "X"
  url = "https://x.com/"
  weight = 30
