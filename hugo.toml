[languages.ja.menu]
  [[languages.ja.menu.main]]
    identifier = "blog"
    name = "ブログ"
    url = "/ja/posts/"
    weight = 10
  [[languages.ja.menu.main]]
    identifier = "topic-map"
    name = "トピックマップ"
