baseURL = "https://blog.pingpongtech.us.kg/"
languageCode = "en-us"
title = "PingPongTech"
theme = "blowfish"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  colorScheme = "pingpongtech"
  defaultAppearance = "dark"
  autoSwitchAppearance = false
  enableSearch = true
  enableCodeCopy = true
  logo = "img/avatar.png"
  favicon = "favicon.png"
  images = ["img/avatar.png"]
  description = "PingPongTech is a cybersecurity think tank focused on zero trust architecture, critical infrastructure defense, and modern threat analysis."
  mainSections = ["posts", "resources"]

  [params.author]
    name = "PingPongTech"
    image = "img/avatar.png"
    bio = "Cybersecurity research and strategic analysis spanning zero trust architecture, critical infrastructure protection, and emerging threats."

  [params.header]
    layout = "fixed-fill-blur"

  [params.homepage]
    layout = "background"
    showRecent = true
    showRecentItems = 6
    showMoreLink = true
    showMoreLinkDest = "/posts/"
    cardView = true

  [params.list]
    showHero = true
    heroStyle = "ppt"
    showBreadcrumbs = false
    showSummary = true
    showTableOfContents = true
    cardView = true
    showWordCount = false
    showAuthorBottom = true
    sharingLinks = ["linkedin", "twitter", "facebook"]

  [params.article]
    showDate = true
    showViews = false
    showLikes = false
    showReadingTime = true
    showWordCount = false
    showAuthorBottom = true
    showAuthor = true
    showTaxonomies = true
    showTableOfContents = true
    sharingLinks = ["linkedin", "twitter", "facebook"]

  [params.footer]
    showScrollToTop = true
    showAppearanceSwitcher = false

[languages]
  [languages.en]
    languageName = "English"
    title = "PingPongTech"
    languageCode = "en-US"
    weight = 1
    [languages.en.params]
      displayName = "EN"
      isoCode = "en"
      dateFormat = "2 January 2006"

  [languages.zh-tw]
    languageName = "繁體中文"
    title = "PingPongTech"
    languageCode = "zh-TW"
    weight = 2
    [languages.zh-tw.params]
      displayName = "繁中"
      isoCode = "zh-TW"
      dateFormat = "2006年1月2日"

  [languages.ja]
    languageName = "日本語"
    title = "PingPongTech"
    languageCode = "ja-JP"
    weight = 3
    [languages.ja.params]
      displayName = "日本語"
      isoCode = "ja-JP"
      dateFormat = "2006年1月2日"

[languages.en.menu]
  [[languages.en.menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/en/posts/"
    weight = 10
  [[languages.en.menu.main]]
    identifier = "resources"
    name = "Resources"
    url = "/en/resources/"
    weight = 20
  [[languages.en.menu.main]]
    identifier = "about"
    name = "About"
    url = "/en/about/"
    weight = 30

