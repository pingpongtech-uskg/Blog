[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"
  series = "series"

[privacy]
  [privacy.googleAnalytics]
    anonymizeIP = true
    disable = false
    respectDoNotTrack = true
    useSessionStorage = false
