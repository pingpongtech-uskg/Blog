{{ if .IsTranslated }}
<div class="ppt-lang-switch" aria-label="language switcher">
  {{ $current := .Lang }}
  {{ range .AllTranslations }}
  <a href="{{ .RelPermalink }}" class="ppt-lang-btn {{ if eq .Lang $current }}active{{ end }}" title="{{ .Title }}">
    {{ .Language.Params.displayName | emojify }}
  </a>
  {{ end }}
</div>
{{ end }}
