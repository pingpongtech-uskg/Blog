{{ define "main" }}
<article class="max-w-4xl">
  <header>
    <h1 class="mt-4 text-4xl font-extrabold text-neutral-900 dark:text-neutral">{{ .Title }}</h1>
    {{ with .Params.description }}
    <p class="mt-3 text-neutral-500 dark:text-neutral-400">{{ . }}</p>
    {{ end }}
  </header>

  <section class="mt-8 prose max-w-none dark:prose-invert">
    {{ .Content }}
  </section>
</article>
{{ end }}
